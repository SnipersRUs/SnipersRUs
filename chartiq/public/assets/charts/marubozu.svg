<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f172a"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Previous mixed candles -->
  <line x1="300" y1="180" x2="330" y2="220" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="305" y="190" width="20" height="20" fill="#22c55e"/>
  
  <line x1="350" y1="170" x2="380" y2="230" stroke="#ef4444" stroke-width="8" stroke-linecap="butt"/>
  <rect x="355" y="180" width="20" height="40" fill="#ef4444"/>
  
  <line x1="400" y1="190" x2="430" y2="240" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="405" y="200" width="20" height="30" fill="#22c55e"/>
  
  <!-- Green Marubozu - large body, almost no wicks -->
  <rect x="450" y="150" width="20" height="110" fill="#22c55e"/>
  <line x1="460" y1="145" x2="460" y2="155" stroke="#22c55e" stroke-width="4" stroke-linecap="butt"/>
  <line x1="460" y1="260" x2="460" y2="270" stroke="#22c55e" stroke-width="4" stroke-linecap="butt"/>
  
  <!-- After Marubozu - continuation -->
  <line x1="500" y1="160" x2="530" y2="210" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="505" y="170" width="20" height="30" fill="#22c55e"/>
  
  <!-- Label -->
  <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="Arial">Marubozu Pattern</text>
</svg>