<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f172a"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Previous bullish candles showing uptrend -->
  <line x1="300" y1="350" x2="330" y2="280" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="305" y="300" width="20" height="40" fill="#22c55e"/>
  
  <line x1="350" y1="280" x2="380" y2="200" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="355" y="220" width="20" height="50" fill="#22c55e"/>
  
  <line x1="400" y1="200" x2="430" y2="140" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="405" y="150" width="20" height="40" fill="#22c55e"/>
  
  <!-- Shooting Star candle - small body, long upper wick -->
  <line x1="450" y1="40" x2="480" y2="180" stroke="#ef4444" stroke-width="8" stroke-linecap="butt"/>
  <rect x="455" y="140" width="20" height="20" fill="#ef4444"/>
  
  <!-- Label -->
  <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="Arial">Shooting Star Pattern</text>
</svg>