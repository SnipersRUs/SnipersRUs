<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f172a"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Previous uptrend -->
  <line x1="300" y1="300" x2="330" y2="220" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="305" y="230" width="20" height="60" fill="#22c55e"/>
  
  <line x1="350" y1="240" x2="380" y2="180" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="355" y="190" width="20" height="50" fill="#22c55e"/>
  
  <line x1="400" y1="200" x2="430" y2="150" stroke="#22c55e" stroke-width="8" stroke-linecap="butt"/>
  <rect x="405" y="160" width="20" height="40" fill="#22c55e"/>
  
  <!-- Three Black Crows - three long red candles closing progressively lower -->
  <!-- First crow -->
  <line x1="450" y1="130" x2="480" y2="200" stroke="#ef4444" stroke-width="8" stroke-linecap="butt"/>
  <rect x="455" y="140" width="20" height="50" fill="#ef4444"/>
  
  <!-- Second crow - closes lower than first -->
  <line x1="500" y1="160" x2="530" y2="240" stroke="#ef4444" stroke-width="8" stroke-linecap="butt"/>
  <rect x="505" y="170" width="20" height="60" fill="#ef4444"/>
  
  <!-- Third crow - closes lower than second -->
  <line x1="550" y1="200" x2="580" y2="290" stroke="#ef4444" stroke-width="8" stroke-linecap="butt"/>
  <rect x="555" y="210" width="20" height="70" fill="#ef4444"/>
  
  <!-- Highlight box around the pattern -->
  <rect x="440" y="110" width="150" height="200" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="10,5" opacity="0.5"/>
  
  <!-- Label -->
  <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="Arial">Three Black Crows Pattern</text>
</svg>