<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SRUS Scanner</title>
    <style>
        :root {
            --bg-dark: #0b0e11;
            --bg-panel: #151a21;
            --bg-input: #2a2e39;
            --text-primary: #eaecef;
            --text-secondary: #848e9c;
            --accent-gold: #f0b90b;
            --border-color: #2b3139;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            color: #fff;
            background: var(--accent-gold);
            color: #000;
        }
        
        .btn:hover { opacity: 0.9; }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }

        .footer-text a {
            color: var(--accent-gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">SRUS Scanner</div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="footer-text">
            <p>Don't have an account? <a href="landing.html">Subscribe Now</a></p>
            <p style="margin-top: 10px;"><a href="landing.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            // Store login state
            localStorage.setItem('srus_logged_in', 'true');
            localStorage.setItem('srus_email', document.getElementById('email').value);
            
            // Redirect to scanner
            window.location.href = 'scanner.html';
        }
    </script>
</body>
</html>
